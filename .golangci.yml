version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gocritic
  settings:
    errcheck:
      check-type-assertions: true
      # Fire-and-forget calls whose error is not actionable (idiomatic to ignore).
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*text/tabwriter.Writer).Flush
    misspell:
      locale: US
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - unnamedResult
        - paramTypeCombine
        - hugeParam
        - appendCombine
        - commentedOutCode
        - ifElseChain
        - stringXbytes
        - assignOp
        - emptyStringTest
        - unslice
        - httpNoBody
        - whyNoLint
        - indexAlloc
        - preferStringWriter
        - appendAssign
        - typeDefFirst
        - regexpSimplify
        - dupImport
        - nestingReduce
        - tooManyResultsChecker
        # Perf micro-opts in non-hot paths; pointer/index rewrites add risk for little gain
        # (consistent with hugeParam above being disabled).
        - rangeValCopy
        - deferInLoop
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/praetorian-inc/trajan
