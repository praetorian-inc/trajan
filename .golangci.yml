version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gocritic
  settings:
    errcheck:
      check-type-assertions: true
    misspell:
      locale: US
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - unnamedResult
        - paramTypeCombine
        - hugeParam
        - appendCombine
        - commentedOutCode
        - ifElseChain
        - stringXbytes
        - assignOp
        - emptyStringTest
        - unslice
        - httpNoBody
        - whyNoLint
        - indexAlloc
        - preferStringWriter
        - appendAssign
        - typeDefFirst
        - regexpSimplify
        - dupImport
        - nestingReduce
        - tooManyResultsChecker
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/praetorian-inc/trajan
