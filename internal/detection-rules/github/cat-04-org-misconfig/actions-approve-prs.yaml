id: cat-04/actions-approve-prs
scenario_id: cat-04/03
title: "Repo allows Actions to approve PRs (per-repo)"
subject: repo
severity: high
confidence: high
description: >
  Repo setting `can_approve_pull_request_reviews` is enabled. A workflow with
  `pull-requests: write` can self-approve PRs, bypassing branch-protection
  rules that expect human review.

where:
  all_of:
    - can_approve_pull_request_reviews == true

evidence:
  - "Repo {{ repo }} permits Actions to approve PRs."

remediation_hint: >
  Settings → Actions → General → Workflow permissions: untick "Allow GitHub
  Actions to create and approve pull requests".
