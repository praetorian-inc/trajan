id: cat-03/write-collab-self-pr-approve
scenario_id: cat-03/01
title: "Job can approve PRs (pull-requests:write + repo can_approve)"
subject: job
severity: high
confidence: high
description: >
  Job permission set includes `pull-requests: write`. A write collaborator can
  run a workflow that approves their own PR — collapsing branch protection that
  requires human review. NOTE: the full Python rule also requires the repo
  setting `can_approve_pull_request_reviews` to be enabled; that repo Actions
  setting lives in repo-entity facts not yet normalized in this build, so this
  port expresses only the job-side `pull-requests:write` condition.

where:
  all_of:
    - permissions.pull-requests == "write"

evidence:
  - "Job has pull-requests:write at {{ _provenance.workflow_file }}:{{ _provenance.yaml_line_range }}. Combined with repo can_approve_pull_request_reviews."

remediation_hint: >
  Disable "Allow GitHub Actions to create and approve pull requests" in repo
  Actions settings. Drop pull-requests:write where review-creation isn't needed.
