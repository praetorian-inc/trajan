id: cat-04/org-secret-all-repos
scenario_id: cat-04/05
title: "Org secret scoped to all repos (incl. archived/low-trust)"
subject: org
severity: medium
confidence: high
description: >
  An organization secret has visibility=all, meaning every repo (including
  archived, internal/private, and forks of public repos) inherits the secret.
  This widens the secret's exposure surface beyond what most repos need.

where:
  all_of:
    - any_org_secret_visibility_all == true

evidence:
  - "Org has org-wide secrets scoped to all repos: {{ org_secrets_with_all_visibility }}"
  - "Every repo (including archived) inherits these."

remediation_hint: >
  Scope org secrets to "Selected repositories" only. Archived repos rarely
  need production secrets at all.
