id: cat-08/apps-pats-app-private-key-as-secret
scenario_id: cat-08/02
title: "App private key stored as a long-lived org/repo secret"
subject: org
severity: high
confidence: medium
description: >
  An organization secret name matches App-private-key naming conventions
  (APP_PRIVATE_KEY, GH_APP_KEY, APP_PEM, ...). The key never rotates
  automatically and any workflow with the secret in scope can mint
  installation tokens at will. org_app_key_secrets is precomputed by the org
  normalizer from the org actions-secret names.

where:
  all_of:
    - org_app_key_secrets != []

evidence:
  - "Org-level secrets matching App-key naming: {{ org_app_key_secrets }}"

remediation_hint: >
  Replace long-lived App keys with on-demand minting via a dedicated minter
  workflow, OR store the key only in an environment with required reviewers.
