id: cat-08/apps-pats-webhook-secret-reuse
scenario_id: cat-08/12
title: "Org has webhook-secret-shaped org secret (reused signing secret risk)"
subject: org
severity: medium
confidence: low
description: >
  An org-level secret name matches webhook-signing naming. If the same value
  is used across multiple installations / receivers, a leak in one becomes a
  signature-spoofing capability across all. org_webhook_secret_names is
  precomputed by the org normalizer. NOTE: whether the secret value is
  actually shared across receivers is not observable from collected metadata,
  so this fires on naming shape alone.

where:
  all_of:
    - org_webhook_secret_names != []

evidence:
  - "Webhook-signing-shaped secrets: {{ org_webhook_secret_names }}"

remediation_hint: >
  Use per-installation webhook signing secrets; rotate on any suspected
  exposure.
