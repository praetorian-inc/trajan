id: cat-12/env-bypass-secret-collision
scenario_id: cat-12/11
title: "Env-scoped secret has same name as a repo-scoped secret (collision)"
subject: org
severity: medium
confidence: low
description: >
  An environment-scoped secret has the same name as a repo-scoped secret. When a
  job runs without an environment: field, it reads the repo-scoped value; with
  environment:, it reads the env-scoped one. Identical names are a configuration
  trap that mask environment misroutes. (PARTIAL) The org fact record only
  exposes org_actions_secret_names; a full env-vs-repo cross-scope name diff is
  deferred (needs per-scope secret inventories joined across repos/environments),
  so this fires once per org whenever any org-scoped secret names exist.

where:
  all_of:
    - org_actions_secret_names != []

evidence:
  - "(PARTIAL) prototype emits this rule once per org when env/repo secret-name collisions exist; full check needs a cross-secret-scope diff."

remediation_hint: >
  Use distinct, scope-prefixed secret names: PROD_DB_URL, STAGING_DB_URL, rather
  than DB_URL in two scopes.
