id: cat-08/apps-pats-classic-pat-as-secret
scenario_id: cat-08/03
title: "Long-lived classic PAT stored as org-level secret"
subject: org
severity: high
confidence: medium
description: >
  An organization secret name contains PAT / TOKEN_PAT / PERSONAL_ACCESS,
  suggesting a long-lived classic personal access token. Classic PATs grant
  the user's full permission set, never expire by default, and survive
  user-account permission changes — a known persistence channel.
  org_pat_named_secrets is precomputed by the org normalizer.

where:
  all_of:
    - org_pat_named_secrets != []

evidence:
  - "Org-level secrets matching PAT naming: {{ org_pat_named_secrets }}"

remediation_hint: >
  Migrate to fine-grained PATs with expiration, OR replace with App tokens.
