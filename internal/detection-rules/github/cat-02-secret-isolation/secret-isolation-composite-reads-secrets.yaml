id: cat-02/secret-isolation-composite-reads-secrets
scenario_id: cat-02/11
title: "Composite action used by a job that reads secrets"
subject: job
severity: high
confidence: low
description: >
  A local composite action (./.github/actions/...) is used by a job that reads
  secrets. Composite actions inherit the caller's env by default, so a PR that
  edits the composite's action.yml can read secrets the caller had. PARTIAL —
  full coverage requires recursive composite inlining, which is not implemented;
  this matches on the presence of a local composite plus secret reads only.

where:
  all_of:
    - local_composite_actions_used != []
    - reads_any_secret == true

evidence:
  - "Job uses local composite actions {{ local_composite_actions_used }} and reads {{ secrets_referenced }}."

remediation_hint: >
  Pin composite actions to a SHA from a protected ref; consider sourcing the
  composite from a separate (read-only) repo to break the in-repo edit path.
