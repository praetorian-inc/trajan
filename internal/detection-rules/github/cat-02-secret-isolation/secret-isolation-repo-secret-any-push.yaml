id: cat-02/secret-isolation-repo-secret-any-push
scenario_id: cat-02/04
title: "Repo secret read on push from any branch"
subject: job
severity: high
confidence: medium
description: >
  Workflow runs on push (no branch filter) and reads repo-scoped secrets.
  Anyone with write-collab can push a branch and run with secrets — no env
  gating, no branch protection on push.

where:
  all_of:
    - triggers ∋ {push}
    - reads_any_secret == true
  none_of:
    - environment.name != null
    - trigger_filters.push.branches != null

evidence:
  - "Job runs on push (no branch filter) and reads secrets {{ secrets_referenced }}."

remediation_hint: >
  Add a `branches:` filter to the push trigger AND/OR move the secret-reading
  step into an environment-gated job.
