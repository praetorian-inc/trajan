id: cat-02/secret-isolation-dispatch-env-input
scenario_id: cat-02/07
title: "Environment chosen dynamically from dispatch input"
subject: job
severity: medium
confidence: high
description: >
  The job's environment: field resolves through ${{ inputs.<x> }} or another
  runtime expression, letting the dispatcher pick any environment the workflow
  can deploy to. Combined with weak environment policies, a write-collab can
  run prod secrets via the dev env name (or vice versa).

where:
  all_of:
    - environment_chosen_dynamically == true
    - reads_any_secret == true

evidence:
  - "Environment selected at runtime: {{ environment }}"
  - "Secrets exposed: {{ secrets_referenced }}"

remediation_hint: >
  Hard-code the environment per job. Where dispatch input drives env, the
  input must be a strict enum AND the environment must require human review.
