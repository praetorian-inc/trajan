id: cat-02/secret-isolation-env-no-branch-policy
scenario_id: cat-02/02
title: "Job deploys to env with no branch policy + no reviewers"
subject: chain
severity: high
confidence: high
description: >
  Job targets a deployment environment that has neither a branch policy nor
  required reviewers. Any branch can run the job and read the environment's
  secrets unattended. Joins the env-deployments chain (one item per job→env
  pairing, produced by correlate during normalize) — env protection facts
  (branch policy, reviewers) come from the collected environments artifact.

chain_of:
  join: env-deployments
  for_each: deploys
  where:
    all_of:
      - job.reads_any_secret == true
      - env_no_branch_policy == true
      - env_no_reviewers == true

evidence:
  - "Job {{ job._id }} deploys to env {{ env_name }} with no branch policy and no reviewers"
  - "Secrets exposed: {{ job.secrets_referenced }}"

remediation_hint: >
  Set the environment's "Deployment branch policy" to protected branches or
  selected list, and add at least one required reviewer.
