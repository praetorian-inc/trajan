id: cat-02/secret-isolation-dispatch-any-branch
scenario_id: cat-02/01
title: "workflow_dispatch + secrets, no branch gating"
subject: job
severity: high
confidence: medium
description: >
  Workflow is triggered by workflow_dispatch and reads secrets. Any
  write-collab can choose an arbitrary branch (incl. a freshly-pushed branch
  with their own code) and run with org/repo secrets. No deployment-environment
  gate constrains which refs run with the secrets.

where:
  all_of:
    - triggers ∋ {workflow_dispatch}
    - reads_any_secret == true
  none_of:
    - environment.name != null

evidence:
  - "workflow_dispatch job reads secrets {{ secrets_referenced }} without an environment gate."

remediation_hint: >
  Gate dispatch via a deployment environment with required reviewers + a
  branch policy that constrains which refs can target the environment.
