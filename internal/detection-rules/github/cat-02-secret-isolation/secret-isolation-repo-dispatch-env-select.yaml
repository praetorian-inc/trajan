id: cat-02/secret-isolation-repo-dispatch-env-select
scenario_id: cat-02/09
title: "repository_dispatch + dynamic environment + secrets"
subject: job
severity: medium
confidence: medium
description: >
  Workflow triggered by repository_dispatch payload selects the environment
  dynamically AND reads secrets. The payload is API-driven (anyone with a PAT
  scoped to the repo can fire), and dynamic env selection bypasses static
  branch policy.

where:
  all_of:
    - triggers ∋ {repository_dispatch}
    - environment_chosen_dynamically == true
    - reads_any_secret == true

evidence:
  - "repository_dispatch job picks env from payload, reads {{ secrets_referenced }}."

remediation_hint: >
  Hard-code env. Drop secret reads in payload-driven jobs unless the
  environment requires human review.
