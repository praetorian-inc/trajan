id: cat-02/secret-isolation-issue-comment-default-secrets
scenario_id: cat-02/10
title: "issue_comment workflow reads secrets on default branch"
subject: job
severity: high
confidence: high
description: >
  Workflow triggered by issue_comment (which always runs the default branch's
  workflow file) reads secrets. Combined with the attacker-controllable comment
  body, this is a clean read-secrets-from-arbitrary-comment path.

where:
  all_of:
    - triggers ∋ {issue_comment}
    - reads_any_secret == true

evidence:
  - "issue_comment job reads {{ secrets_referenced }}."
  - "Comment body is attacker-controlled; default-branch workflow file is the source of truth."

remediation_hint: >
  Wrap the secret-reading work in a strong actor-association gate AND/OR
  move it to a separate workflow that runs only after manual approval.
