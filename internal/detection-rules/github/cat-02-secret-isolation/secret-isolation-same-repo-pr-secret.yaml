id: cat-02/secret-isolation-same-repo-pr-secret
scenario_id: cat-02/05
title: "pull_request from same-repo branch reads secrets"
subject: job
severity: high
confidence: medium
description: >
  Workflow runs on pull_request (not pull_request_target) and reads secrets.
  Same-repo PRs run with full secret access (only fork PRs are stripped).
  Any write collaborator branching off the repo can read prod secrets.

where:
  all_of:
    - triggers ∋ {pull_request}
    - reads_any_secret == true

evidence:
  - "pull_request job reads {{ secrets_referenced }}; same-repo PRs run unstripped."

remediation_hint: >
  Move secret-handling work to a separate workflow on a protected event
  (push to main with env gate, or workflow_run downstream), never on pull_request.
