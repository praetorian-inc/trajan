id: cat-13/masking-readonly-abuse
scenario_id: cat-13/06
title: "Injected setvariable with issecret/isreadonly pins attacker value and hides tampering"
subject: pipeline
severity: medium
confidence: medium
description: >
  An attacker injects ##vso[task.setvariable variable=X;isreadonly=true;
  issecret=true] before the author's own assignment. The isreadonly lock
  pins the attacker's value — the author's later setvariable is silently
  ignored. The issecret flag masks the planted value in build logs, hiding
  the tampering from reviewers. Primarily an evasion amplifier for
  scenarios 01-03 rather than a standalone privileged sink.

where:
  all_of:
    - echoes_untrusted_to_stdout == true
    - has_downstream_variable_consumer == true
    - untrusted_echo_precedes_author_setvariable == true

evidence:
  - "Pipeline {{ _provenance.pipeline_name }}: untrusted echo at step {{ echo_step }} precedes author variable assignment at step {{ author_set_step }}"
  - "Variable {{ consumed_variable }} consumed downstream at {{ variable_consumer_step }}"
  - "First-writer-wins: attacker's isreadonly=true blocks author's later write"

remediation_hint: >
  Set control variables with isreadonly=true in the FIRST step of the job,
  before any step that echoes untrusted data. Use static YAML variables:
  blocks (which are set before any step runs) for security-critical values
  rather than runtime setvariable.
