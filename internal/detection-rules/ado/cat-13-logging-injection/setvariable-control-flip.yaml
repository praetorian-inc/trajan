id: cat-13/setvariable-control-flip
scenario_id: cat-13/01
title: "Untrusted text echoed to stdout injects ##vso[task.setvariable] to flip a control variable"
subject: logging_command_injection
severity: high
confidence: high
description: >
  A step echoes attacker-controlled text (a commit message, PR source
  branch, a file from the checked-out PR, or a fetched HTTP body) to stdout.
  The Azure Pipelines agent unconditionally parses every stdout line for
  ##vso[...] logging commands, so an embedded task.setvariable redefines a
  control variable for all later steps in the job (and, with isoutput=true,
  for later stages), flipping a deploy gate or condition the author trusted.
  No YAML edit or queue-time permission is required — only crafted untrusted
  content. Parsing is unconditional; no control-plane setting disables it.

where:
  all_of:
    - "via == 'setvariable_control_flip'"
    - "untrusted_source in {commit_message, pr_source_branch, file_content, http_response}"

evidence:
  - "Pipeline {{ pipeline_id }} job {{ job }} ({{ project }}): untrusted {{ untrusted_source }} echoed at step {{ echo_step }}"
  - "Injected ##vso[task.setvariable] consumed at step {{ consumer_step }}, effect {{ effect }} on {{ target_resource }}"
  - "confidence={{ confidence }} identity_scope={{ identity_scope }}"

remediation_hint: >
  Never echo attacker-controlled text (commit messages, PR fields, PR files,
  fetched bodies) to stdout. Pipe untrusted data to a file instead of
  printing it, or set security-critical control variables in a static YAML
  variables: block (set before any step runs) rather than via runtime
  setvariable. Isolate untrusted-echo steps from steps that read control
  variables.
