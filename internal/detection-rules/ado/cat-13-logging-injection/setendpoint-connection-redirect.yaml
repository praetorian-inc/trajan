id: cat-13/setendpoint-connection-redirect
scenario_id: cat-13/03
title: "Untrusted text echoed to stdout injects ##vso[task.setendpoint] to redirect a live service connection"
subject: logging_command_injection
severity: critical
confidence: high
description: >
  A step echoes attacker-controlled text (commit message, PR source branch,
  a file from the checked-out PR, or a fetched HTTP body) to stdout. An
  embedded ##vso[task.setendpoint id=<guid>;field=url|authParameter]<value>
  mutates a service connection in-flight — redirecting its URL to an attacker
  host or overwriting its auth parameter. A later authenticated task
  (AzureCLI, Docker login, kubectl, a REST task) then ships the connection's
  credential to the attacker or operates against the attacker's endpoint. The
  connection GUID is discoverable from pipeline YAML, build logs, or the
  Service Endpoints REST API. Pure data-flow — no misconfiguration required.

where:
  all_of:
    - "via == 'setendpoint_redirect'"
    - "untrusted_source in {commit_message, pr_source_branch, file_content, http_response}"

evidence:
  - "Pipeline {{ pipeline_id }} job {{ job }} ({{ project }}): untrusted {{ untrusted_source }} echoed at step {{ echo_step }}"
  - "Injected ##vso[task.setendpoint] redirects {{ target_resource }} at step {{ consumer_step }}, effect {{ effect }}"
  - "confidence={{ confidence }} identity_scope={{ identity_scope }}"

remediation_hint: >
  Never echo attacker-controlled data to stdout in a job that uses service
  connections. Isolate untrusted-echo steps in a separate job from
  authenticated tasks. Redirect untrusted output to files. Monitor build logs
  for unexpected ##vso[task.setendpoint] commands.
