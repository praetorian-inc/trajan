id: cat-10/pool-no-checks-self-hosted
scenario_id: cat-10/07
title: "No Approvals and Checks on a self-hosted agent pool — any branch can consume the host"
subject: agent_pool
severity: informational
confidence: high
description: >
  A self-hosted agent pool has no Approvals and Checks configured. Any
  pipeline run from any branch — including attacker-created feature
  branches — can consume the agent with no approval, branch control, or
  required template gate. Checks live outside the YAML and cannot be
  edited by pipeline authors; their absence removes the last control
  before low-trust code touches a high-value host. The finding is a
  posture check; severity rises when the pool is confirmed to carry
  privileged agents, Managed Identities, or high-privilege run-as
  accounts.

where:
  all_of:
    - checks == []
    - is_self_hosted == true

evidence:
  - "Agent pool {{ name }}: zero Approvals and Checks configured"
  - "Pool type: self-hosted ({{ agent_count }} agents)"
  - "Any authorized pipeline from any branch can schedule jobs with no gate"

remediation_hint: >
  Add at least an Approval check on the pool with
  requester-cannot-approve-own-runs enabled. Add a Branch control check
  scoped to refs/heads/main (or the release branch) with branch
  protection required. Consider adding a Required template check to
  enforce a hardened job template for pipelines using this pool.
