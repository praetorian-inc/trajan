id: cat-10/shared-nonephemeral-agent-residue
scenario_id: cat-10/01
title: "Shared non-ephemeral self-hosted agent exposes host-resident secrets to low-trust pipelines"
subject: chain
severity: high
confidence: medium
description: >
  A self-hosted agent pool is shared across trust tiers and does not use
  ephemeral or scale-set rotation. The work directory, tool cache,
  run-as account home, and agent credentials persist between jobs. A
  low-trust pipeline scheduled onto the agent can read secrets, tokens,
  kubeconfigs, and cloud credentials a prior privileged pipeline left on
  disk — including Managed Identity tokens reachable via IMDS and
  privileges inherited from a high-privilege run-as account. No exploit
  code is needed; reading disk suffices.

chain_of:
  join: shared-agent-host-exposure
  for_each: consuming_pipelines
  where:
    all_of:
      - pool.is_self_hosted == true
      - pool.is_ephemeral == false
      - pool.is_shared_across_trust_tiers == true
      - pipeline.contributor_can_edit_yaml == true

evidence:
  - "Agent pool {{ pool.name }} is self-hosted and non-ephemeral"
  - "Pool shared across trust tiers: {{ pool.consuming_project_count }} projects"
  - "Low-trust pipeline {{ pipeline_name }} can schedule onto this pool"
  - "Host-resident assets at risk: workspace residue, tool cache, run-as credentials, IMDS tokens"

remediation_hint: >
  Use ephemeral agents (VMSS scale-set agents or container-based agents
  that reset after each job). If non-ephemeral agents must remain,
  restrict pipeline permissions to trusted pipelines only — remove open
  access. Add Approvals and Checks (branch control, approval) on the
  pool resource. Ensure privileged pipelines set workspace clean to all.
  Audit the run-as account and any attached Managed Identity for
  over-privilege.
