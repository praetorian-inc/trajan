id: cat-10/shared-nonephemeral-agent-residue
scenario_id: cat-10/01
title: "Non-ephemeral self-hosted agent pool — host state persists between jobs for residue harvest"
subject: agent_pool
severity: low
confidence: medium
description: >
  A self-hosted agent pool runs static (non-elastic / non-scale-set)
  agents, so the machine is reused across jobs and its state persists.
  Checked-out source, build output, tool caches under the run-as
  account's home, and any secret a prior privileged job wrote to disk
  survive into the next job unless that pipeline explicitly cleaned the
  workspace. A low-trust pipeline scheduled onto the same agent can read
  that residue with no exploit code — just reading disk. Microsoft-hosted
  and elastic/scale-set pools get a fresh VM per job and are not exposed;
  the risk is specific to persistent self-hosted hosts. This is a
  posture enabler — severity rises when the pool is confirmed to carry
  privileged run-as agents or host-resident secrets.

where:
  all_of:
    - is_hosted == false
    - is_elastic == false
    - size > 0

evidence:
  - "Self-hosted agent pool {{ name }} (id {{ id }}) is non-elastic — agents are reused across jobs"
  - "Pool has {{ size }} persistent agents; workspace, tool cache, and run-as home survive between jobs"
  - "A low-trust pipeline scheduled onto this pool can read a prior job's on-disk residue"

remediation_hint: >
  Prefer ephemeral agents — VM scale-set (elastic) pools or
  container-based agents that reset after each job. If static agents
  must remain, restrict pipeline permissions to trusted pipelines only,
  set workspace clean-to-all on privileged pipelines, and add Approvals
  and Checks (branch control, approval) on the pool resource. Audit the
  agent run-as account and any attached Managed Identity for
  over-privilege.
