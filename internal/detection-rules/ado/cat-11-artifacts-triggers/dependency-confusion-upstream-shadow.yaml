id: cat-11/dependency-confusion-upstream-shadow
scenario_id: cat-11/06
title: "Artifacts feed has public upstream sources enabled (dependency-confusion / substitution surface)"
subject: feed
severity: high
confidence: medium
description: >
  An Azure Artifacts feed has upstream sources enabled with at least one
  PUBLIC upstream (npmjs, NuGet.org, PyPI, Maven Central, crates.io, ...).
  Any package fetched from a public upstream is automatically saved into
  the feed and becomes immutable and trusted thereafter — persisting even
  after the upstream is removed. This is the dependency-confusion /
  substitution surface: an attacker who publishes a same-named package on
  the public registry (naming gap), or an over-broad Collaborator/Build
  Service identity who deliberately saves a chosen malicious public
  version, permanently poisons the feed for every float-version consumer.
  The general defect is public upstream auto-save on a private feed; the
  saved-package origin is masked in the feed, so review cannot see it.

where:
  all_of:
    - upstream_enabled == true
    - upstream_sources.upstreamSourceType ∋ 'public'

evidence:
  - "Feed {{ name }} (scope {{ scope }}) has upstream sources enabled"
  - "Public upstream types present: {{ upstream_sources.upstreamSourceType }}"
  - "Public upstream registries: {{ upstream_sources.location }}"
  - "Any package resolved from a public upstream is auto-saved into the feed as an immutable, trusted entry"

remediation_hint: >
  Disable public upstream sources on feeds that host security-critical
  internal packages, or restrict which upstreams are allowed. Pin package
  versions with lock files and verify hashes so a saved public version
  cannot silently substitute an internal name. Reserve internal package
  names publicly (NuGet ID-prefix reservation, npm org scope) to close the
  naming gap. Audit the feed's saved-from-upstream packages for unexpected
  entries. Restrict save-from-upstream (Collaborator) membership to the
  minimum set of build identities.
