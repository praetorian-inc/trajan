id: cat-11/incoming-webhook-unauth-trigger
scenario_id: cat-11/10
title: "Incoming webhook with unset HMAC secret allows unauthenticated trigger and payload injection"
subject: chain
severity: high
confidence: medium
description: >
  An incoming webhooks resource creates a public endpoint that requires
  no authorization by default. The HMAC secret on the service connection
  is optional and frequently left blank. When unset, any party that
  discovers the webhook name can fire the pipeline and supply an
  arbitrary JSON body. The body is exposed via compile-time template
  expressions that splice attacker data into generated YAML before
  runtime — enabling command and structure injection in a run carrying
  the pipeline's secrets and service connections. This is the only
  scenario in the catalog with a genuinely unauthenticated attacker.

chain_of:
  join: webhook-injection-path
  for_each: webhook_resources
  where:
    all_of:
      - webhook.hmac_secret_is_set == false
      - webhook.payload_reaches_execution_sink == true
      - consumes_privileged_resource == true

evidence:
  - "Pipeline {{ pipeline_name }} uses incoming webhook {{ webhook.name }}"
  - "Service connection {{ webhook.service_connection_name }}: HMAC secret is unset"
  - "Payload expression {{ webhook.injection_sink_expression }} reaches execution sink"
  - "Pipeline consumes privileged resource: {{ privileged_resource_names }}"

remediation_hint: >
  Set a strong HMAC secret on every incoming webhook service connection
  and rotate it periodically. Validate and sanitize webhook payload
  fields before use in template expressions. Avoid splicing webhook
  payload data into script or task-input bodies via compile-time
  expressions. Add Approvals and Checks on the pipeline's protected
  resources to gate webhook-triggered runs.
