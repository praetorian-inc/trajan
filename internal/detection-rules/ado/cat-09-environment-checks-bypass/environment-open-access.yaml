id: cat-09/environment-open-access
scenario_id: cat-09/02
title: "Environment grants open access to all pipelines with no approval gate"
subject: environment
severity: high
confidence: medium
description: >
  The environment's Pipeline permissions are set to open access
  (all_pipelines == true), so any pipeline in the project — including one a
  Contributor authors — may target it in a deployment job and inherit the
  service-connection details of any resource attached to the environment.
  Pipeline-permission scoping is the second gate protecting an environment;
  when it is open, the only remaining barrier is the checks. If no Approval
  check is configured, an attacker brings their own pipeline and deploys as
  the trusted one. Open access on a restricted, checked environment is not
  this finding — the risk is open access combined with the absence of an
  approval gate.
where:
  all_of:
    - "pipeline_permissions.all_pipelines == true"
    - none_of:
        - "checks.type_name ∋ 'Approval'"
evidence:
  - "Environment {{ project }}/{{ name }} has open pipeline access (all_pipelines=true)"
  - "No Approval check configured — any authorized pipeline deploys without review"
  - "Checks present: {{ checks.type_name }}"
remediation_hint: >
  Select "Restrict permission" on the environment's Pipeline permissions to
  revoke open access, and explicitly authorize only the trusted deployment
  pipelines. Add an Approval check with self-approval restricted and a Branch
  control check scoped to protected branches. Ensure any VM/Kubernetes
  resource attached to the environment does not front a broader service
  connection than intended.
