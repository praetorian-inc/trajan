id: cat-09/shadow-environment-retarget
scenario_id: cat-09/08
title: "Contributor creates ungated shadow environment to bypass prod checks"
subject: chain
severity: high
confidence: high
description: >
  Contributors hold the environment Creator role by default, and a YAML
  reference to a non-existent environment auto-creates it with zero
  checks. An attacker edits the deployment job to target a new environment
  name while keeping the same prod service connection in the deploy steps.
  The hardened prod environment retains all its approvals, but the deploy
  no longer uses it — the new ungated environment imposes no gate, and the
  prod credential travels with the service connection, not the
  environment. The one-line YAML change is invisible to any audit focused
  on the hardened environment's check inventory.

chain_of:
  join: shadow-environment-bypass
  for_each: deployment_jobs
  where:
    all_of:
      - environment.checks == []
      - environment.is_recently_created == true
      - consumes_privileged_resource == true
      - pipeline.contributor_can_edit_yaml == true

evidence:
  - "Environment {{ environment.name }} was auto-created with zero checks"
  - "Pipeline {{ pipeline_name }} targets this environment in a deployment job"
  - "Stage consumes privileged service connection: {{ privileged_resource_names }}"
  - "Contributors hold environment Creator role — can auto-create by naming in YAML"

remediation_hint: >
  Remove Contributors from the environment Creator role or restrict it to
  a narrow admin group. Place approval and branch-control checks on every
  service connection and variable group the deploy consumes (not only on
  the environment) so that retargeting the environment alone cannot bypass
  the gate. Monitor for newly created environments that consume production
  service connections. Consider a Required template check on the service
  connection to enforce a trusted deployment shape regardless of which
  environment is named.
