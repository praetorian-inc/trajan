id: cat-09/branch-control-allows-all-refs
scenario_id: cat-09/04
title: "Branch control check allows all refs or treats unknown protection as pass"
subject: environment
severity: high
description: >
  The environment carries a Branch control check whose configuration is
  ineffective: the allowed-branches list contains a wildcard pattern such
  as refs/heads/* or *, and/or "require branch protection" is off, and/or
  "unknown protection status" is set to allow. This makes the branch
  control gate decorative — a Contributor creates or pushes to any branch,
  runs the privileged pipeline from that ref, and the check passes because
  every branch matches the allowed list and no protection is enforced. The
  check appears present in the Approvals tab, giving false assurance.

where:
  all_of:
    - has_branch_control_check == true
  any_of:
    - branch_control_allows_all_refs == true
    - branch_control_verify_protection == false
    - branch_control_allow_unknown_status == true

evidence:
  - "Environment {{ name }}: Branch control allowed branches = {{ branch_control_allowed_branches }}"
  - "Verify branch protection: {{ branch_control_verify_protection }}"
  - "Allow unknown protection status: {{ branch_control_allow_unknown_status }}"

remediation_hint: >
  Restrict the Branch control allowed-branches list to fully qualified
  protected branches (e.g. refs/heads/main, refs/heads/release/*) that
  correspond to branches with enforced branch policies. Enable "Require
  branches to have protection" and set the unknown-protection-status
  behavior to deny. Audit that no Contributor can create a branch matching
  the allowed pattern without a review policy.
