id: cat-09/checks-on-env-secrets-elsewhere
scenario_id: cat-09/09
title: "Checks gate the environment but an ungated service connection or variable group is consumed"
subject: chain
severity: high
confidence: high
description: >
  The production environment carries proper approval and check gates, but
  the same pipeline (or a sibling stage) also consumes a service
  connection, variable group, or secure file that has no checks of its
  own. A Contributor adds a step in a plain job (non-deployment) that uses
  the ungated resource directly — the environment approval never fires
  because no environment is referenced, and the ungated resource's empty
  check set imposes no gate. The attacker exercises prod credentials or
  exfiltrates prod secrets while the environment audit looks clean.

chain_of:
  join: asymmetric-resource-gating
  for_each: ungated_resources
  where:
    all_of:
      - ungated_resource.checks == []
      - ungated_resource.is_privileged == true
      - pipeline.also_consumes_gated_environment == true
      - pipeline.contributor_can_edit_yaml == true

evidence:
  - "Environment {{ gated_environment.name }} is properly gated ({{ gated_environment.check_types }})"
  - "But {{ ungated_resource.type }} {{ ungated_resource.name }} has no checks"
  - "Pipeline {{ pipeline_name }} consumes both — ungated resource reachable from a plain job"
  - "Attacker adds a step using {{ ungated_resource.name }} without triggering env approval"

remediation_hint: >
  Apply approval and branch-control checks to every privileged resource
  the pipeline consumes — not only the environment. Checks can be
  configured on service connections, variable groups, secure files, and
  agent pools independently. Restrict pipeline permissions (disable open
  access) on each resource so only trusted pipelines may consume them.
  Audit the full set of protected resources per stage, not just the
  environment.
