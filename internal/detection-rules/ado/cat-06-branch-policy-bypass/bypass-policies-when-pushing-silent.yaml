id: cat-06/bypass-policies-when-pushing-silent
scenario_id: cat-06/01
title: "Identity with Bypass-policies-when-pushing can push directly to a CI-triggering protected branch"
subject: chain
severity: high
description: >
  An identity (or group) has the Bypass policies when pushing permission on a
  branch that has required branch policies and triggers a privileged pipeline.
  This permission makes every required policy — minimum reviewers, build
  validation, comment resolution — advisory only. The push lands directly on
  the protected branch with no PR, no reviewer notification, and no warning.
  The privileged CI pipeline then executes the attacker's code with production
  credentials. The bypass is a per-identity ACL on the branch security
  namespace, completely separate from the policy definitions and invisible to
  any policy-list or YAML audit.

chain_of:
  join: bypass-push-to-privileged-branch
  for_each: bypass_identities
  where:
    all_of:
      - repo.branch_acl.effectiveAllow ∋ PolicyExempt
      - branch_has_required_policy == true
      - triggers_privileged_pipeline == true

evidence:
  - "Identity {{ identity_name }} has Bypass policies when pushing (PolicyExempt) on {{ branch }}"
  - "Branch {{ branch }} has required policies: {{ required_policy_names }}"
  - "Branch triggers privileged pipeline {{ pipeline_name }} consuming {{ privileged_resource_names }}"
  - "Push bypasses all required policies silently — no opt-in step or warning"

remediation_hint: >
  Remove the Bypass policies when pushing permission from all non-service
  identities. Audit group inheritance — the grant is often inherited through
  broad groups like Contributors or Build Administrators. If the permission is
  required for automation accounts, add compensating controls such as
  conditional-access policies and audit-log alerting on direct pushes to
  protected branches.
