id: cat-05/wif-all-pipelines-grant
scenario_id: cat-05/01
title: "Federated connection granted to all pipelines with no Approvals & checks"
subject: service_connection
severity: high
confidence: medium
description: >
  A Workload Identity Federation service connection has grant_all_pipelines enabled and carries
  no approval or branch-control checks. Any pipeline in the project can request a token scoped
  to the underlying app registration's Azure RBAC role. If that registration holds Owner or
  Contributor at subscription scope, every pipeline in the project can mutate cloud resources
  without a secondary approval gate. The combination of open authorization and absent checks
  eliminates both access control and compensating controls in a single misconfiguration.

where:
  all_of:
    - auth_scheme == "WorkloadIdentityFederation"
    - grant_all_pipelines == true
    - checks == []

evidence:
  - "Service connection: {{ service_connection.name }}"
  - "Auth scheme: {{ service_connection.auth_scheme }}"
  - "Scope level: {{ service_connection.scope_level }}"
  - "Grant all pipelines: {{ service_connection.grant_all_pipelines }}"
  - "Checks configured: {{ service_connection.checks }}"

remediation_hint: >
  Disable "Grant access to all pipelines" on the service connection and switch to explicit
  per-pipeline authorization. Add at minimum a Branch control check limiting use to protected
  branches and an Approval check requiring a human reviewer before token issuance. Audit the
  underlying app registration's Azure RBAC assignments and reduce the role to the narrowest
  scope required (prefer a custom role over Owner or Contributor at subscription scope).
