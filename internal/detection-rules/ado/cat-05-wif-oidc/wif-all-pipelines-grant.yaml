id: cat-05/wif-all-pipelines-grant
scenario_id: cat-05/01
title: "WIF service connection authorized to all pipelines"
subject: service_connection
severity: high
confidence: medium
description: >
  A Workload Identity Federation service connection has "Grant access permission to
  all pipelines" enabled (pipeline_permissions.all_pipelines == true). WIF connections
  carry no secret to steal, so the only control on their use is who can drive them.
  With the all-pipelines grant, any pipeline in the project — including a throwaway one
  a Contributor authors on a non-protected branch — can name this connection and mint an
  Entra access token with the full Azure RBAC of the backing app registration. Microsoft
  explicitly marks this option "not recommended". The per-pipeline authorization gate that
  would otherwise force explicit authorization is removed.
where:
  all_of:
    - "is_wif == true"
    - "pipeline_permissions.all_pipelines == true"
evidence:
  - "Service connection: {{ name }} ({{ project }})"
  - "Auth scheme: {{ auth_scheme }}"
  - "Scope level: {{ scope_level }}"
  - "All pipelines authorized: {{ pipeline_permissions.all_pipelines }}"
remediation_hint: >
  Disable "Grant access permission to all pipelines" on the connection and switch to
  explicit per-pipeline authorization. Because the WIF subject sc://{org}/{project}/{connection}
  cannot pin a branch, also add an Approval and a Branch control check on the connection so a
  non-protected branch cannot mint the token. Audit the backing app registration's Azure RBAC
  and reduce it to the narrowest scope required (prefer a custom least-privilege role over
  Owner/Contributor at subscription scope).
