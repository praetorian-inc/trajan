id: cat-05/wif-no-branch-gate
scenario_id: cat-05/02
title: "WIF service connection has no Approval or Branch-control check"
subject: service_connection
severity: high
confidence: medium
description: >
  A Workload Identity Federation subject takes the form sc://{org}/{project}/{connection}.
  Unlike GitHub OIDC claims, this subject encodes the connection, never a branch, ref, or
  environment, and Entra matches it case-sensitively with no wildcards. The federated trust
  therefore cannot distinguish which branch triggered a run: the OIDC token carries the same
  sub for a feature branch as for main. The ADO check layer — an Approval or a Branch control
  check on the connection — is the only place branch/approval enforcement can live. This
  connection has no checks configured, so any branch of any authorized pipeline can mint a
  token with the full RBAC scope of the backing identity. A Contributor who can push to a
  non-protected branch (or queue on an arbitrary branch) obtains cloud credentials without review.
where:
  all_of:
    - "is_wif == true"
    - "checks == []"
evidence:
  - "Service connection: {{ name }} ({{ project }})"
  - "Auth scheme: {{ auth_scheme }}"
  - "Checks configured: {{ checks }}"
  - "All pipelines authorized: {{ pipeline_permissions.all_pipelines }}"
remediation_hint: >
  Add a Branch control check restricting allowedBranches to the protected branches that
  legitimately require cloud access (e.g. refs/heads/main, refs/heads/releases/*) and an
  Approval check requiring a human reviewer. Because the WIF subject sc://{org}/{project}/{connection}
  contains no branch component, this connection-side check is the sole mechanism that prevents
  an unprotected branch from minting the identity's token. Alternatively gate use behind an
  Environment that carries these checks.
