id: cat-08/required-template-partial-coverage
scenario_id: cat-08/07
title: "Required template guards the service connection but not the variable group or environment the job also consumes"
subject: chain
severity: high
description: >
  A Required template check is configured on the production service
  connection, but the same pipeline job also consumes a variable group,
  environment, or agent pool that carries equivalent privilege and has no
  Required template check. An attacker writes a non-conforming pipeline
  that skips the template entirely and consumes the unprotected resource
  directly — the template-governed connection is irrelevant. Enforcement
  is per-resource; protecting one handle does nothing for a sibling handle
  that exposes the same secrets or deployment capability.

chain_of:
  join: asymmetric-template-coverage
  for_each: unguarded_resources
  where:
    all_of:
      - resource.has_required_template_check == false
      - resource.is_privileged == true
      - sibling_resource.has_required_template_check == true
      - pipeline.contributor_can_edit_yaml == true

evidence:
  - "Guarded resource: {{ sibling_resource.name }} ({{ sibling_resource.type }}) has Required template check"
  - "Unguarded resource: {{ resource.name }} ({{ resource.type }}) has no Required template check"
  - "Both consumed by pipeline {{ pipeline_name }}"
  - "Attacker can skip the template and consume {{ resource.name }} directly"

remediation_hint: >
  Apply a Required template check to every resource that carries
  equivalent privilege — service connections, variable groups,
  environments, and agent pools that expose the same secrets or
  deployment capability. Audit the Approvals and Checks panel on each
  resource the pipeline consumes and ensure uniform coverage.
