id: cat-08/template-source-contributor-writable
scenario_id: cat-08/01
title: "Privileged pipeline extends a template from a Contributor-writable repo or unpinned ref"
subject: chain
severity: critical
confidence: high
description: >
  A production pipeline uses extends or resources.repositories to pull a
  template from a shared repo where Contributors hold Contribute permission,
  or the template reference omits a ref (defaulting to mutable
  refs/heads/main). Either way a Contributor can edit the template content
  that compiles and runs inside the consumer pipeline with its secrets,
  service connections, and System.AccessToken. The consumer YAML looks
  clean — the vulnerability is entirely in the template repo's write
  permissions or the missing version pin.

chain_of:
  join: writable-template-source
  for_each: template_sources
  where:
    all_of:
      - template_source.contributor_can_write == true
      - consumes_privileged_resource == true

evidence:
  - "Pipeline {{ pipeline_name }} extends template from {{ template_source.repo }}"
  - "Template ref: {{ template_source.ref }} ({{ template_source.ref_status }})"
  - "Contributors with Contribute on template repo: {{ template_source.write_grantees }}"
  - "Consumer holds privileged resource: {{ privileged_resource_names }}"

remediation_hint: >
  Pin the template reference to an immutable SHA or a branch protected by
  required reviewers and build validation. Restrict Contribute permission
  on the template repo to a trusted maintainer group — remove the default
  Contributors grant. Use a Required template check on the consumer's
  service connections so only pipelines extending an approved template can
  consume them.
