id: cat-07/pipeline-decorator-org-backdoor
scenario_id: cat-07/03
title: "Non-builtin pipeline decorator extension injects steps into every job org-wide"
subject: extension
severity: high
confidence: high
description: >
  An installed extension contributes a pipeline decorator
  (ms.azure-pipelines-agent-job.*-tasks contribution) and is not one of
  Microsoft's built-in extensions. Pipeline decorators silently inject
  steps into the pre-job / post-job / pre- or post-checkout phase of every
  job in every pipeline org-wide. The injected steps run with each job's
  System.AccessToken and secret context, appear in no committed YAML, and
  cannot be opted out of by pipeline authors. A malicious or over-broad
  third-party decorator is the highest-leverage org-settings backdoor: one
  extension compromises the entire fleet.

where:
  all_of:
    - "has_pipeline_decorator_contribution == true"
    - "is_builtin == false"

evidence:
  - "Extension {{ extension_id }} ({{ extension_name }}) by publisher {{ publisher_id }} contributes a pipeline decorator"
  - "is_builtin = {{ is_builtin }}, is_trusted = {{ is_trusted }}, org_installed = {{ org_installed }}"
  - "Injected steps run in every job with that job's System.AccessToken and secrets"

remediation_hint: >
  Audit every installed extension that contributes a pipeline decorator.
  Review the decorator template for outbound network calls, secret access,
  or arbitrary script execution. Uninstall any decorator whose publisher
  or template is not explicitly sanctioned. Restrict extension-installation
  rights to a minimal set of trusted administrators and require review
  before installing non-Microsoft extensions.
