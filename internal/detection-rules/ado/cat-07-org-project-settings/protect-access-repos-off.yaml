id: cat-07/protect-access-repos-off
scenario_id: cat-07/01
title: "Protect access to repositories in YAML pipelines OFF at project level"
subject: project
severity: high
confidence: medium
description: >
  The project setting "Protect access to repositories in YAML pipelines"
  (limit_job_auth_scope_to_referenced_repos) is disabled. With this toggle
  OFF, a pipeline's System.AccessToken can read (and potentially write)
  Azure DevOps repos the pipeline never declares via a checkout or uses
  statement, so any Contributor who can edit a pipeline silently reaches
  repos beyond its declared dependencies. The setting defaults OFF for
  organizations created before May 2020. Combined with an unrestricted job
  authorization scope (limit_job_auth_scope_to_current_project OFF), reach
  extends across projects.

where:
  all_of:
    - "limit_job_auth_scope_to_referenced_repos == false"

evidence:
  - "Project {{ project }}: limit_job_auth_scope_to_referenced_repos = {{ limit_job_auth_scope_to_referenced_repos }}"
  - "limit_job_auth_scope_to_current_project = {{ limit_job_auth_scope_to_current_project }} (collection scope amplifies cross-project reach when OFF)"

remediation_hint: >
  Enable "Protect access to repositories in YAML pipelines" at the
  organization level so it applies to all projects and cannot be turned off
  per project. This restricts each pipeline's token to repos explicitly
  referenced by a checkout or uses statement. Also set "Limit job
  authorization scope to current project" for both release and non-release
  pipelines.
