id: cat-07/service-hook-outbound-exfil
scenario_id: cat-07/10
title: "Service hook Webhooks subscription posts event metadata to an external URL"
subject: service_hook
severity: informational
confidence: high
description: >
  A service-hook subscription uses the Webhooks consumer with action
  "Post a request through HTTP" to send event metadata (commits, builds,
  pushes) to an arbitrary external URL. Creating a subscription requires
  the "Edit subscriptions" permission, held by default only by project
  administrators but potentially delegated to Contributors. The outbound
  channel leaks repository activity, build timing, and branch metadata
  to the target endpoint. Payloads are bounded to resources the
  subscription creator can access but can cover the full project for a
  privileged insider.

where:
  all_of:
    - consumer_type == "webHooks"
    - action_id == "httpRequest"
    - target_url_is_external == true

evidence:
  - "Service hook subscription {{ subscription_id }} in project {{ project_name }}"
  - "Consumer: Webhooks — action: Post via HTTP to {{ target_url }}"
  - "Trigger event: {{ event_type }} — fires for resources visible to creator {{ creator_identity }}"
  - "Edit subscriptions delegated to: {{ delegated_groups }}"

remediation_hint: >
  Audit service-hook subscriptions for Webhooks consumers targeting
  external URLs. Restrict the "Edit subscriptions" permission to project
  administrators only and remove any delegation to Contributor groups.
  Maintain an allowlist of sanctioned webhook target domains and alert on
  subscriptions pointing elsewhere. Review subscriptions periodically for
  stale or unrecognized endpoints.
